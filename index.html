<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <title>ÂM THANH ÔN TẬP ĐƯỜNG TRƯỜNG</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #1f1f1f;
            color: white;
            font-family: Arial, sans-serif;
        }

        h4 {
            text-align: center;
            margin-bottom: 10px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            width: 100%;
            padding: 10px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 16px;
            font-size: 24px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 6px 0 #b5b5b5,
                0 8px 15px rgba(0, 0, 0, 0.35),
                inset 0 2px 2px rgba(255, 255, 255, 0.8);

            transition: all 0.08s ease;
            border: none;
            border-radius: 20px;

            background: linear-gradient(to bottom,
                    #f8f8f8 0%,
                    #e8e8e8 100%);

            color: #111;
            font-weight: bold;
        }

        button::before {
            content: "";

            position: absolute;
            left: 15%;
            top: 8%;

            width: 70%;
            height: 25%;

            border-radius: 999px;

            background: rgba(255, 255, 255, 0.25);

            pointer-events: none;
        }

        button:active {
            transform: translateY(2px);

            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.2),
                0 1px 2px rgba(0, 0, 0, 0.15);
        }

        .div1 {
            width: fit-content;
            display: flex;
            gap: 50px;
        }

        .div1 button {
            width: 80px;
            height: 80px;
            border-radius: 100%;
        }

        .div1 .CHAMDIEM {
            background: linear-gradient(to bottom,
                    #ff4f5d,
                    #c62839);

            color: white;

            border-radius: 50%;

            box-shadow:
                0 6px 0 #8e1b28,
                0 10px 18px rgba(0, 0, 0, 0.4),
                inset 0 2px 3px rgba(255, 255, 255, 0.5);
        }

        .div1 .TUN {
            background: linear-gradient(to bottom,
                    #7dd321,
                    #4fa300);

            color: white;

            border-radius: 50%;

            box-shadow:
                0 6px 0 #387400,
                0 10px 18px rgba(0, 0, 0, 0.4),
                inset 0 2px 3px rgba(255, 255, 255, 0.5);
        }

        .div2 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin: 10px auto;

            justify-items: center;
        }

        .div2 button {
            width: 100%;
            aspect-ratio: 1;

            font-size: clamp(14px, 4vw, 16px);
        }

        button:active {
            transform: scale(0.97);
        }

        .remote {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            grid-template-rows: repeat(3, minmax(0, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
        }

        .remote button {
            background: linear-gradient(to bottom,
                    #4f8cff,
                    #3368d4);
            color: white;

            box-shadow:
                0 6px 0 #234da3,
                0 8px 15px rgba(0, 0, 0, 0.35),
                inset 0 2px 2px rgba(255, 255, 255, 0.4);
            width: 100%;
            aspect-ratio: 1;
            font-size: clamp(18px, 4vw, 28px);
            border-radius: 16px;
        }

        .remote .center {
            border-radius: 100px;
        }

        .up {
            grid-column: 2;
            grid-row: 1;
        }

        .left {
            grid-column: 1;
            grid-row: 2;
        }

        .center {
            grid-column: 2;
            grid-row: 2;
        }

        .right {
            grid-column: 3;
            grid-row: 2;
        }

        .down {
            grid-column: 2;
            grid-row: 3;
        }
    </style>
</head>

<body>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
    <h4>🎵 ÂM THANH ÔN TẬP ĐƯỜNG TRƯỜNG</h4>
    <div class="container">
        <div class="div1">
            <button class="CHAMDIEM" onclick="playSound('CHAMDIEM')">
                KT
            </button>
            <button class="TUN" onclick="playSound('TUN')">
                TUN
            </button>
        </div>

        <div class="div2">
            <button onclick="playSound('XP')">
                XP
            </button>
            <button onclick="playSound('TS')">
                TS
            </button>
            <button onclick="playSound('GS')">
                GS
            </button>
            <button onclick="playSound('KT')">
                KT
            </button>
            <button onclick="playSound('TSS')">
                TSS
            </button>
            <button onclick="playSound('GSS')">
                GSS
            </button>
        </div>
        <div class="remote">
            <button class="up" onclick="playSound('RG')">RG</button>
            <button class="left" onclick="playSound('HL')">HL</button>
            <button class="center" onclick="playSound('TN')">TN</button>
            <button class="right" onclick="playSound('QT')">QT</button>
            <button class="down" onclick="playSound('CL')">CL</button>
        </div>
        <div class="div2">
            <button onclick="playSound('DAT')">
                DAT
            </button>
            <button onclick="playSound('PTAY')">
                PTay
            </button>
            <button onclick="playSound('XNTRAI')">
                XN TRÁI
            </button>
            <button onclick="playSound('3SO')">
                3 Số
            </button>
            <button onclick="playSound('SAISO')">
                Sai số
            </button>
            <button onclick="playSound('CMAY')">
                CMay
            </button>
            <button onclick="playSound('VEN')">
                Về N
            </button>
            <button onclick="playSound('TUA')">
                TUA
            </button>
            <button onclick="playSound('XNPHAI')">
                XN PHẢI
            </button>
        </div>
    </div>
    <audio id="TUN" src="sounds/TUN.mp3"></audio>
    <audio id="RG" src="sounds/RUNGIAT.mp3"></audio>
    <audio id="HL" src="sounds/HIEULENH.mp3"></audio>
    <audio id="TN" src="sounds/sound2.mp3"></audio>
    <audio id="QT" src="sounds/QTAC.mp3"></audio>
    <audio id="CL" src="sounds/sound2.mp3"></audio>
    <audio id="XP" src="sounds/XUATPHAT.mp3"></audio>
    <audio id="TS" src="sounds/TANGSO.mp3"></audio>
    <audio id="GS" src="sounds/GIAMSO.mp3"></audio>
    <audio id="KT" src="sounds/KETTHUC.mp3"></audio>
    <audio id="DAT" src="sounds/sound1.mp3"></audio>
    <audio id="PTAY" src="sounds/sound2.mp3"></audio>
    <audio id="XNTRAI" src="sounds/sound2.mp3"></audio>
    <audio id="3SO" src="sounds/sound2.mp3"></audio>
    <audio id="SAISO" src="sounds/sound2.mp3"></audio>
    <audio id="CMAY" src="sounds/sound2.mp3"></audio>
    <audio id="VEN" src="sounds/sound2.mp3"></audio>
    <audio id="TUA" src="sounds/sound2.mp3"></audio>
    <audio id="XNPHAI" src="sounds/sound2.mp3"></audio>

    <script>
        let currentAudio = null;

        function playSound(id) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            const audio = document.getElementById(id);

            currentAudio = audio;

            audio.currentTime = 0;
            audio.play();

            audio.onended = () => {
                if (currentAudio === audio) {
                    currentAudio = null;
                }
            };
        }
    </script>

</body>

</html>
